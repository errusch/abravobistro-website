name: Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: "0 6 * * 0"

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known malicious packages
        run: |
          MALICIOUS="winston-middleware|next-runtimejs|web3-request|ethers-request|express-middleware|node-fetch2|lodash-patch|react-devtools-core|debug-utils"
          if grep -riE "$MALICIOUS" package.json package-lock.json; then
            echo "::error::Known malicious package pattern detected!"
            exit 1
          fi

      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v1
        with:
          scan-args: '--lockfile=package-lock.json'
